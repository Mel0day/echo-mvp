<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo — 认知副驾</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --muted: #666;
    --accent: #7c6af7;
    --accent-dim: #3d3466;
    --green: #4caf7d;
    --green-dim: #1a2a1e;
    --green-border: #2a4a35;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  header h1 span { color: var(--accent); }
  .stats-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .stats-badge.active { color: var(--green); border-color: var(--green-border); }
  .header-spacer { flex: 1; }
  #import-btn {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  #import-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Consent overlay */
  #consent-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .consent-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    max-width: 480px;
    width: 90%;
  }
  .consent-box h2 { font-size: 16px; margin-bottom: 16px; }
  .consent-box p { color: var(--muted); line-height: 1.65; margin-bottom: 10px; font-size: 13px; }
  .consent-box .hl { color: var(--text); }
  .consent-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border);
    cursor: pointer; font-family: inherit; font-size: 13px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.82; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); }

  /* Import modal */
  #import-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    display: none; align-items: center; justify-content: center;
    z-index: 90;
  }
  #import-modal.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    max-width: 440px;
    width: 90%;
  }
  .modal-box h3 { font-size: 14px; margin-bottom: 14px; }
  .modal-box p { color: var(--muted); font-size: 12px; line-height: 1.6; margin-bottom: 16px; }
  .file-drop {
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .file-drop:hover { border-color: var(--accent); color: var(--text); }
  .file-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .import-progress {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    display: none;
  }
  .import-progress.visible { display: block; }
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 2px;
    height: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .import-result {
    margin-top: 12px;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    display: none;
  }
  .import-result.visible { display: block; }
  .import-result.success { color: var(--green); background: var(--green-dim); border: 1px solid var(--green-border); }
  .import-result.error { color: #f87171; background: #2a1a1a; border: 1px solid #4a2a2a; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  /* Main */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* Empty state */
  #empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; text-align: center; padding: 40px;
    pointer-events: none;
  }
  #empty-state.hidden { display: none; }
  .empty-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 4px;
  }
  #empty-state h2 { font-size: 15px; color: var(--text); }
  #empty-state .tagline { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    pointer-events: all;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); }

  /* Chat */
  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 680px; }
  .msg.echo { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user.ask .bubble { background: var(--accent-dim); border-color: var(--accent); }
  .msg.user.stored .bubble { background: var(--green-dim); border-color: var(--green-border); }
  .msg-meta { font-size: 11px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-meta { text-align: right; }

  /* Day divider */
  .day-divider {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 11px;
    margin: 4px 0;
  }
  .day-divider::before, .day-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Citations */
  .citations { margin-top: 8px; }
  details summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  details summary:hover { color: var(--text); }
  .citation {
    margin-top: 6px;
    background: #141414;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
  }
  .citation-meta { color: var(--muted); margin-bottom: 3px; }
  .citation-text { color: #999; font-style: italic; }

  /* Typing animation */
  .typing { display: flex; gap: 5px; padding: 10px 14px; }
  .typing span {
    width: 6px; height: 6px; background: var(--muted);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.35; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Loading spinner in button */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  /* Input area */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 14px 20px 16px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .mode-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .mode-tab {
    padding: 4px 12px; border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; font-family: inherit; font-size: 12px;
    transition: all 0.15s;
  }
  .mode-tab.active { background: var(--surface); color: var(--text); border-color: var(--accent); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit; font-size: 13px;
    padding: 10px 14px;
    resize: none; min-height: 42px; max-height: 160px;
    line-height: 1.5; outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  #send-btn {
    padding: 10px 18px; border-radius: 6px; border: none;
    cursor: pointer; font-family: inherit; font-size: 13px;
    font-weight: 600; white-space: nowrap; transition: opacity 0.15s;
    min-width: 58px;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  #send-btn.record { background: var(--green); color: #fff; }
  #send-btn.ask { background: var(--accent); color: #fff; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>

<!-- Consent -->
<div id="consent-overlay" style="display:none">
  <div class="consent-box">
    <h2>使用前请了解</h2>
    <p>Echo 会把你输入的文字发送到<span class="hl">火山引擎 embedding API</span>进行向量化，用于语义检索。</p>
    <p><span class="hl">你的原始文字仅存储在本服务器</span>——只有向量数据发送到火山引擎 embedding API，原文存储在服务器 <code>/data/</code> 目录下，随时可以清除。</p>
    <div class="consent-actions">
      <button class="btn btn-primary" onclick="giveConsent(true)">我理解，开始用</button>
      <button class="btn btn-ghost" onclick="giveConsent(false)">不同意</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div id="import-modal">
  <div class="modal-box">
    <h3>📥 导入 Notion 笔记</h3>
    <p>在 Notion 中选择「导出」→「导出为 Markdown & CSV」，下载 zip 文件后上传到这里。</p>
    <div class="file-drop" id="file-drop">
      <input type="file" id="import-file" accept=".zip" onchange="handleFileSelect(event)">
      <div id="file-drop-label">点击选择 .zip 文件，或拖放到此处</div>
    </div>
    <div class="import-progress" id="import-progress">
      <span id="import-progress-text">处理中...</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="import-progress-bar"></div>
      </div>
    </div>
    <div class="import-result" id="import-result"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeImportModal()">关闭</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <h1><span>Echo</span></h1>
  <div class="stats-badge" id="stats-badge">加载中...</div>
  <div class="header-spacer"></div>
  <button id="import-btn" onclick="openImportModal()">📥 导入</button>
</header>

<main>
  <div id="empty-state">
    <div class="empty-icon">🧠</div>
    <h2>Echo 在等你说话</h2>
    <p class="tagline">你的认知副驾</p>
    <div class="suggestion-chips">
      <button class="chip" onclick="chipImport()">📥 导入 Notion 笔记</button>
      <button class="chip" onclick="chipThink()">✍️ 说说你在思考什么</button>
    </div>
  </div>
  <div id="chat"></div>
</main>

<div id="input-area">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-record" onclick="setMode('record')">📝 告诉 Echo</button>
    <button class="mode-tab" id="tab-ask" onclick="setMode('ask')">🔍 问 Echo</button>
  </div>
  <div class="input-row">
    <textarea id="text-input" rows="1"
      placeholder="说说你最近在思考什么..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button id="send-btn" class="record" onclick="send()">记住</button>
  </div>
  <div class="hint" id="hint">记录模式 · ⌘+Enter 发送</div>
</div>

<script>
let mode = 'record';
// Use a separate name to avoid shadowing window.history
let chatHistory = [];
// Track message count to manage empty state
let msgCount = 0;
// Track last shown day for dividers
let lastDayLabel = null;

async function init() {
  const r = await fetch('/consent').then(r => r.json()).catch(() => ({consented: null}));
  if (r.consented === null || r.consented === undefined) {
    document.getElementById('consent-overlay').style.display = 'flex';
  }
  await refreshStats();
}

async function giveConsent(ok) {
  await fetch('/consent', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({consented: ok, timestamp: new Date().toISOString()})
  });
  document.getElementById('consent-overlay').style.display = 'none';
  if (!ok) addMsg('echo', '好的，已关闭 embedding 功能。你可以关闭此页面。');
}

async function refreshStats() {
  try {
    const s = await fetch('/index/stats').then(r => r.json());
    const n = s.total_chunks || 0;
    const el = document.getElementById('stats-badge');
    el.textContent = n > 0 ? `${n} 段记忆` : '空空如也';
    el.className = 'stats-badge' + (n > 0 ? ' active' : '');
    // Update tagline based on memory count, but don't hide empty state here
    if (n > 0) {
      const tagline = document.querySelector('#empty-state .tagline');
      if (tagline) tagline.textContent = `已积累 ${n} 段记忆，随时可以问我`;
    }
  } catch(e) {}
}

function hideEmptyState() {
  document.getElementById('empty-state').classList.add('hidden');
}

function showEmptyState() {
  if (msgCount === 0) {
    document.getElementById('empty-state').classList.remove('hidden');
  }
}

// Suggestion chip handlers
function chipImport() {
  openImportModal();
}

function chipThink() {
  setMode('record');
  document.getElementById('text-input').focus();
}

// Import modal
function openImportModal() {
  document.getElementById('import-modal').classList.add('open');
  // Reset state
  document.getElementById('import-progress').classList.remove('visible');
  document.getElementById('import-result').classList.remove('visible');
  document.getElementById('file-drop-label').textContent = '点击选择 .zip 文件，或拖放到此处';
  document.getElementById('import-file').value = '';
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('open');
}

// Close modal on backdrop click
document.getElementById('import-modal').addEventListener('click', function(e) {
  if (e.target === this) closeImportModal();
});

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-drop-label').textContent = file.name;
  startImport(file);
}

async function startImport(file) {
  const progress = document.getElementById('import-progress');
  const progressText = document.getElementById('import-progress-text');
  const progressBar = document.getElementById('import-progress-bar');
  const result = document.getElementById('import-result');

  progress.classList.add('visible');
  result.classList.remove('visible');
  progressText.textContent = '正在上传...';
  progressBar.style.width = '10%';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const r = await fetch('/import', { method: 'POST', body: formData });
    const d = await r.json();

    if (!r.ok) {
      throw new Error(d.detail || '上传失败');
    }

    const jobId = d.job_id;
    progressBar.style.width = '30%';
    progressText.textContent = '处理中，请稍候...';

    // Poll SSE for progress
    await pollImportStatus(jobId, progressText, progressBar);

    result.className = 'import-result visible success';
    result.textContent = '导入成功！';
    await refreshStats();
  } catch(e) {
    progress.classList.remove('visible');
    result.className = 'import-result visible error';
    result.textContent = `导入失败：${e.message}`;
  }
}

async function pollImportStatus(jobId, progressText, progressBar) {
  return new Promise((resolve, reject) => {
    const es = new EventSource(`/import/status/${jobId}`);
    es.onmessage = function(e) {
      try {
        const data = JSON.parse(e.data);
        if (data.message) progressText.textContent = data.message;
        if (data.total_chunks > 0 && data.processed_files > 0) {
          const pct = Math.min(90, 30 + (data.processed_files / data.total_chunks) * 60);
          progressBar.style.width = pct + '%';
        }
        if (data.status === 'done') {
          progressBar.style.width = '100%';
          es.close();
          resolve();
        } else if (data.status === 'error') {
          es.close();
          reject(new Error(data.error || '处理出错'));
        }
      } catch(err) {
        es.close();
        reject(err);
      }
    };
    es.onerror = function() {
      es.close();
      reject(new Error('连接中断'));
    };
  });
}

function setMode(m) {
  mode = m;
  document.getElementById('tab-record').className = 'mode-tab' + (m === 'record' ? ' active' : '');
  document.getElementById('tab-ask').className = 'mode-tab' + (m === 'ask' ? ' active' : '');
  const inp = document.getElementById('text-input');
  const btn = document.getElementById('send-btn');
  if (m === 'record') {
    inp.placeholder = '说说你最近在思考什么...';
    btn.textContent = '记住'; btn.className = 'record';
    document.getElementById('hint').textContent = '记录模式 · ⌘+Enter 发送';
  } else {
    inp.placeholder = '问 Echo：我之前怎么看 X？我研究过哪些...？';
    btn.textContent = '问'; btn.className = 'ask';
    document.getElementById('hint').textContent = '问答模式 · ⌘+Enter 发送';
  }
  inp.focus();
  // Do NOT clear or hide chat messages when switching modes
}

function handleKey(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); send(); }
  setTimeout(() => autoResize(e.target), 0);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function send() {
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text) return;

  // Clear input immediately and refocus after async work
  inp.value = '';
  inp.style.height = 'auto';

  hideEmptyState();

  if (mode === 'record') await doRecord(text);
  else await doAsk(text);

  // Refocus input after response
  inp.focus();
}

async function doRecord(text) {
  addUserMsg(text, 'stored');
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  const prevText = btn.textContent;
  try {
    const r = await fetch('/journal/entry', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text})
    });
    const d = await r.json();
    addMsg('echo', r.ok ? `已记住 ✓（${d.chunks_stored} 段）` : `记录失败：${d.detail}`);
    if (r.ok) await refreshStats();
  } catch(e) {
    addMsg('echo', `网络错误：${e.message}`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = prevText;
  }
}

async function doAsk(question) {
  addUserMsg(question, 'ask');
  const typing = addTyping();
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>问';

  try {
    const r = await fetch('/qa', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, history: chatHistory.slice(-6)})
    });

    if (!r.ok) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.detail || `HTTP ${r.status}`);
    }

    const d = await r.json();
    typing.remove();

    const answer = d.answer || '（无回答）';
    const el = addMsg('echo', answer);

    if (d.citations && d.citations.length) {
      const cits = document.createElement('div');
      cits.className = 'citations';
      const det = document.createElement('details');
      const sum = document.createElement('summary');
      sum.textContent = `${d.citations.length} 个来源`;
      det.appendChild(sum);
      d.citations.forEach(c => {
        const div = document.createElement('div');
        div.className = 'citation';
        div.innerHTML = `<div class="citation-meta">${esc(c.title)}${c.date ? ' · ' + c.date : ''}</div><div class="citation-text">${esc(c.snippet)}</div>`;
        det.appendChild(div);
      });
      cits.appendChild(det);
      el.querySelector('.bubble').appendChild(cits);
    }

    chatHistory.push({role:'user', content: question});
    chatHistory.push({role:'assistant', content: answer});
  } catch(e) {
    typing.remove();
    addMsg('echo', `请求失败：${e.message}`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '问';
  }
}

function maybeInsertDayDivider() {
  const today = new Date();
  const label = today.toLocaleDateString('zh', {month: 'long', day: 'numeric', weekday: 'short'});
  if (label !== lastDayLabel) {
    lastDayLabel = label;
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'day-divider';
    div.textContent = label;
    chat.appendChild(div);
  }
}

function addUserMsg(text, type) {
  msgCount++;
  maybeInsertDayDivider();
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = `msg user ${type}`;
  el.innerHTML = `<div class="bubble">${esc(text)}</div><div class="msg-meta">${type === 'stored' ? '📝 记录' : '❓ 提问'} · ${ts()}</div>`;
  chat.appendChild(el);
  scrollDown();
  return el;
}

function addMsg(role, text) {
  if (role === 'echo') msgCount++;
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  el.appendChild(bubble);
  if (role === 'echo') {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `Echo · ${ts()}`;
    el.appendChild(meta);
  }
  chat.appendChild(el);
  scrollDown();
  return el;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'msg echo';
  el.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
  chat.appendChild(el);
  scrollDown();
  return el;
}

function scrollDown() {
  const c = document.getElementById('chat');
  c.scrollTop = c.scrollHeight;
}

function ts() {
  return new Date().toLocaleTimeString('zh', {hour: '2-digit', minute: '2-digit'});
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

init();
</script>
